apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: web

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - ingress-local.yaml

commonLabels:
  app.kubernetes.io/name: linked-data-service
  app.kubernetes.io/managed-by: argocd

# Image tags are managed directly in deployment.yaml by the GHA build workflow.
# Do not add an images: override block here — it would override the SHA tags.
