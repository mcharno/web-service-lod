name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linter
        run: yarn lint || echo "Linter not configured, skipping..."
        continue-on-error: true

      - name: Run tests
        run: yarn test || echo "Tests not configured, skipping..."
        continue-on-error: true
